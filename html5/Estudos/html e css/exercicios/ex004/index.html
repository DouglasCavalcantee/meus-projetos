<!DOCTYPE html> <!-- Define que o documento é do tipo HTML5 -->
<html lang="pt-br"> <!-- Tag raiz do HTML e define que o idioma da página é português do Brasil -->

<head> <!-- Cabeçalho do documento (não aparece diretamente na página) -->
    
    <meta charset="UTF-8"> <!-- Define a codificação de caracteres (permite usar acentos normalmente) -->
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <!-- Faz o site se adaptar a diferentes tamanhos de tela (responsividade, importante para celular) -->
    
    <link rel="shortcut icon" href="naruto-icon.ico" type="image/x-icon"> 
    <!-- Define o favicon (ícone que aparece na aba do navegador)
         href = caminho do arquivo do ícone
         type = tipo do arquivo (image/x-icon para .ico) -->
    
    <title>Teste de Favicon</title> <!-- Título da página (aparece na aba do navegador) -->

</head>

<body> <!-- Corpo do site (tudo que aparece para o usuário) -->
    
    <h1>Olha o favicon aqui em cima</h1> 
    <!-- Título principal da página (tag de nível 1) -->
    
</body>

</html> <!-- Fecha o documento HTML -->
